version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: music-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  backend:
    build: ./backend
    container_name: music-backend
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://mongo:27017/musicdb
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  app-net:
    driver: bridge
