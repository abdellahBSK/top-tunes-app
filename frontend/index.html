<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top 10 Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <span class="logo-mark">♪</span>
        <div>
          <h1 class="logo-title">Charts</h1>
          <p class="logo-sub">iTunes Top 10</p>
        </div>
      </div>
      <div class="header-right">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M15 15l-2.5-2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input id="search-input" class="search-input" type="text" placeholder="Search songs or artists…" />
        </div>
        <button id="btn-refresh" class="btn btn-primary" title="Refresh from Apple">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M4 10a6 6 0 1 0 1.5-3.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 5.5V10h4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Refresh
        </button>
        <button id="btn-theme" class="btn btn-icon" title="Toggle theme">
          <svg id="icon-moon" viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M17 12.5A7 7 0 1 1 7.5 3a5.5 5.5 0 0 0 9.5 9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <svg id="icon-sun" viewBox="0 0 20 20" fill="none" width="18" height="18" style="display:none"><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button id="btn-playlist" class="btn btn-icon tab-btn" data-tab="favorites" title="Favorites">
          <svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M10 16s-7-4.5-7-9a4 4 0 0 1 7-2.65A4 4 0 0 1 17 7c0 4.5-7 9-7 9z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span id="fav-count" class="badge" style="display:none">0</span>
        </button>
      </div>
    </header>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="charts">Charts</button>
      <button class="tab-btn" data-tab="favorites">My Playlist</button>
    </nav>

    <!-- Charts tab -->
    <section id="tab-charts" class="tab-content active">
      <div id="now-playing" class="now-playing" style="display:none">
        <div class="np-artwork-wrap">
          <img id="np-img" src="" alt="" class="np-artwork" />
          <div class="np-eq"><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="np-info">
          <p id="np-title" class="np-title"></p>
          <p id="np-artist" class="np-artist"></p>
        </div>
        <div class="np-controls">
          <button id="np-stop" class="btn btn-icon" title="Stop">
            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><rect x="4" y="4" width="12" height="12" rx="2"/></svg>
          </button>
          <div class="progress-bar-wrap"><div id="progress-bar" class="progress-bar"></div></div>
          <span id="np-time" class="np-time">0:00</span>
        </div>
        <div id="lyrics-panel" class="lyrics-panel" style="display:none">
          <div id="lyrics-content" class="lyrics-content"></div>
        </div>
      </div>

      <div id="song-list" class="song-list"></div>
      <div id="skeleton" class="song-list"></div>
    </section>

    <!-- Favorites tab -->
    <section id="tab-favorites" class="tab-content">
      <div id="favorites-list" class="song-list"></div>
      <div id="favorites-empty" class="empty-state" style="display:none">
        <svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M24 40s-18-11.5-18-23a10 10 0 0 1 18-6A10 10 0 0 1 42 17c0 11.5-18 23-18 23z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        <p>No favorites yet.</p>
        <p class="empty-sub">Heart a song from the charts to add it here.</p>
      </div>
    </section>
  </div>

  <audio id="audio-player"></audio>
  <script type="module" src="/main.js"></script>
</body>
</html>
